<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARTTECH</title>
  <link rel="stylesheet" href="status.css" />
  <link rel="stylesheet" href="substyle.css" />
  <link rel="stylesheet" href="mainstyle.css" />
</head>

<body>
  <header class="navbar">
    <div class="navbar-brand">
      <a href="index.html" class="navbar-logo-link">
        <span class="navbar-text">ARTTECH</span>
      </a>
    </div>
  </header>

  <div class="main-container">
    <div class="blockhead">
      <div class="blockname">
        <p class="namehead">STATUS</p>
      </div>
    </div>

    <div class="blockcontent">

      <div class="status-box">
        <span>🎮 CH1</span>
        <span id="chanel1">0</span>
      </div>

      <div class="status-box">
        <span>🎮 CH3</span>
        <span id="chanel3">0</span>
      </div>

      <div class="status-box">
        <span>🎮 CH6</span>
        <span id="chanel6">0</span>
      </div>

      <div class="status-box">
        <span>🎮 CH7</span>
        <span id="chanel7">0</span>
      </div>

      <div class="status-box">
        <span>🎮 CH8</span>
        <span id="chanel8">0</span>
      </div>

      <div class="status-box">
        <div class="status-info">
          <span>⚡ Relay 1</span>
          <span id="relay1">OFF</span>
        </div>
        <div id="lamp1" class="lamp lamp-off"></div>
      </div>

      <div class="status-box">
        <div class="status-info">
          <span>⚡ Relay 2</span>
          <span id="relay2">OFF</span>
        </div>
        <div id="lamp2" class="lamp lamp-off"></div>
      </div>

      <div class="status-box">
        <div class="status-info">
          <span>⚡ Relay 3</span>
          <span id="relay3">OFF</span>
        </div>
        <div id="lamp3" class="lamp lamp-off"></div>
      </div>

      <div class="status-box">
        <div class="status-info">
          <span>⚡ Relay 4</span>
          <span id="relay4">OFF</span>
        </div>
        <div id="lamp4" class="lamp lamp-off"></div>
      </div>

      <!-- <div class="status-box">
        <span>📶 Signal</span>
        <span id="signalValue">0</span>
      </div>
      <div class="status-box">
        <span>📡 Loss</span>
        <span id="lossValue">0%</span>
      </div> -->

    </div>
  </div>

  <script src="status.js"></script>
</body>

</html>
